name: Source health check

on:
  schedule:
    # Every 6 hours — this is a full audit of all 39 sites (not just the
    # notice fetch check-updates.yml does every 30 min), so a lighter
    # schedule is enough to catch a broken selector within a few hours
    # without piling on extra Actions usage.
    - cron: "17 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: health-check
  cancel-in-progress: false

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run health check
        run: node scripts/run-health-check.mjs

      - name: Commit and push if status changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/health-status.json
          git diff --cached --quiet || git commit -m "chore: update health status [skip ci]"
          git push
